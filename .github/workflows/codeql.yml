name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 9 * * 1'

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze JavaScript and TypeScript
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      - uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
